  <rect x="8"  y="32" width="10" height="18" rx="1.5" fill="#FF6B35"/>
  <rect x="22" y="22" width="10" height="28" rx="1.5" fill="#FF6B35"/>
  <rect x="36" y="14" width="10" height="36" rx="1.5" fill="#FF6B35"/>
  <rect x="50" y="26" width="10" height="24" rx="1.5" fill="#FF6B35" opacity="0.75"/>
